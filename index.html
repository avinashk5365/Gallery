<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Social Photo & Video Gallery</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    /* 🌙/☀️ Color Themes Variable Architecture */
    :root {
      --bg-main: #0b0f19;
      --panel-bg: #0f1422;
      --glass-bg: rgba(255, 255, 255, 0.03);
      --glass-bg-hover: rgba(255, 255, 255, 0.07);
      --glass-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f4f6;
      --text-muted: #8a99ad;
      --accent-like: #ff4757;
      --accent-share: #00cec9;
      --accent-download: #38ef7d;
      --primary-blue: #4a90e2;
      --card-radius: 16px;
    }

    [data-theme="light"] {
      --bg-main: #f4f6f9;
      --panel-bg: #ffffff;
      --glass-bg: rgba(0, 0, 0, 0.02);
      --glass-bg-hover: rgba(0, 0, 0, 0.05);
      --glass-border: rgba(0, 0, 0, 0.08);
      --text-main: #1f2937;
      --text-muted: #6b7280;
      --primary-blue: #2563eb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Inter', system-ui, -apple-system, sans-serif;
      background: var(--bg-main);
      min-height: 100vh;
      color: var(--text-main);
      padding-bottom: 100px;
      letter-spacing: -0.01em;
      transition: background 0.3s, color 0.3s;
    }

    /* INITIAL STATE: Main application is hidden until login */
    #mainAppContent {
      display: none;
    }

    header {
      background: var(--panel-bg);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--glass-border);
      padding: 15px 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 20px;
      font-weight: 700;
      background: linear-gradient(135deg, #4a90e2 0%, #a5b4fc 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-actions {
      display: flex;
      align-items: center;
      gap: 15px;
    }

    .btn-icon {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-main);
      width: 40px;
      height: 40px;
      border-radius: 50%;
      cursor: pointer;
      display: flex;
      justify-content: center;
      align-items: center;
      font-size: 16px;
      transition: all 0.2s;
    }
    .btn-icon:hover { background: var(--glass-bg-hover); }

    /* Auth & Profile Elements */
    .user-profile-badge {
      display: flex;
      align-items: center;
      gap: 8px;
      background: var(--glass-bg);
      padding: 6px 14px;
      border-radius: 30px;
      border: 1px solid var(--glass-border);
      font-size: 13px;
      cursor: pointer;
    }
    .user-profile-badge i { color: var(--primary-blue); }

    /* Initial Landing Page Auth Screen Style */
    .auth-overlay {
      position: fixed; top:0; left:0; width:100%; height:100%;
      background: var(--bg-main);
      display: flex; justify-content: center; align-items: center; z-index: 999;
    }
    .auth-card {
      background: var(--panel-bg); border: 1px solid var(--glass-border);
      padding: 40px 30px; border-radius: var(--card-radius); width: 100%; max-width: 400px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.5);
      text-align: center;
    }
    .auth-card h2 { margin-bottom: 10px; font-size: 24px; color: var(--text-main); }
    .auth-card p.subtitle { font-size: 13px; color: var(--text-muted); margin-bottom: 25px; }
    .auth-card input {
      width: 100%; padding: 14px; margin-bottom: 15px; background: var(--glass-bg);
      border: 1px solid var(--glass-border); color: var(--text-main); border-radius: 10px; outline: none;
      font-size: 14px; transition: border-color 0.2s;
    }
    .auth-card input:focus { border-color: var(--primary-blue); }
    .auth-submit-btn {
      width: 100%; padding: 14px; background: var(--primary-blue); color: white;
      border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s;
      font-size: 15px; margin-top: 5px;
    }
    .auth-submit-btn:hover { opacity: 0.9; transform: translateY(-1px); }

    .top-controls {
      max-width: 500px;
      margin: 30px auto 20px auto;
      padding: 0 20px;
    }

    .search-box {
      display: flex;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 50px;
      padding: 4px 18px;
      align-items: center;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--text-main);
      width: 100%;
      padding: 12px 0;
      font-size: 14px;
    }
    .search-box i { color: var(--text-muted); margin-right: 12px; }

    .categories {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding: 10px 20px;
      max-width: 700px;
      margin: 0 auto 20px auto;
      scrollbar-width: none;
    }
    .categories::-webkit-scrollbar { display: none; }

    .cat-btn {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: var(--text-muted);
      padding: 8px 18px;
      border-radius: 50px;
      cursor: pointer;
      white-space: nowrap;
      font-size: 13px;
      transition: all 0.2s ease;
    }

    .cat-btn.active, .cat-btn:hover {
      background: var(--primary-blue);
      color: #fff;
      border-color: var(--primary-blue);
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 24px;
      padding: 20px;
      max-width: 1300px;
      margin: 0 auto;
    }

    .photo-card {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: var(--card-radius);
      overflow: hidden;
      transition: all 0.3s ease;
    }

    .photo-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.15);
    }

    .media-container {
      position: relative;
      width: 100%;
      height: 220px;
      overflow: hidden;
      background: #000;
    }

    .media-container img, .media-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: pointer;
    }

    .video-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0, 0, 0, 0.6);
      padding: 6px 10px;
      border-radius: 30px;
      font-size: 11px;
    }

    .card-info { padding: 16px 16px 12px 16px; }
    .card-info h3 { font-size: 15px; font-weight: 600; text-overflow: ellipsis; white-space: nowrap; overflow: hidden; }
    .card-info .album-tag { font-size: 11px; color: var(--text-muted); display: inline-flex; align-items: center; gap: 4px; margin-top: 4px; }

    .social-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 12px 16px;
      border-top: 1px solid var(--glass-border);
    }

    .social-actions { display: flex; gap: 14px; }

    .action-icon-btn {
      background: none; border: none; color: var(--text-muted);
      cursor: pointer; font-size: 15px; display: inline-flex; align-items: center; gap: 6px;
    }
    .action-icon-btn.liked i, .action-icon-btn.liked span { color: var(--accent-like); }

    .comments-summary { padding: 0 16px 16px 16px; font-size: 12px; }
    .comments-list { max-height: 60px; overflow-y: auto; margin-bottom: 10px; }
    .comment-item { margin-bottom: 4px; color: var(--text-main); }

    .comment-input-box { display: flex; gap: 6px; }
    .comment-input-box input {
      flex: 1; background: rgba(0, 0, 0, 0.05); border: 1px solid var(--glass-border);
      border-radius: 30px; padding: 8px 14px; color: var(--text-main); font-size: 12px; outline: none;
    }

    /* Floating Action & Upload Panel */
    .fab-container { position: fixed; bottom: 30px; right: 30px; z-index: 200; display: flex; flex-direction: column; align-items: flex-end; gap: 12px; }
    .upload-options-panel {
      background: var(--panel-bg); border: 1px solid var(--glass-border);
      padding: 16px; border-radius: 16px; display: none; width: 240px;
      box-shadow: 0 10px 25px rgba(0,0,0,0.2);
    }
    .upload-options-panel h4 { font-size: 14px; margin-bottom: 10px; }
    .upload-options-panel select, .upload-options-panel input {
      width: 100%; background: var(--glass-bg); border: 1px solid var(--glass-border);
      color: var(--text-main); padding: 10px; margin-bottom: 10px; border-radius: 10px; font-size: 12px; outline: none;
    }

    .fab {
      width: 56px; height: 56px; background: var(--primary-blue);
      border-radius: 50%; display: flex; justify-content: center; align-items: center;
      font-size: 20px; color: #fff; cursor: pointer; box-shadow: 0 8px 24px rgba(0, 0, 0, 0.2);
    }

    /* Lightbox overlay configuration */
    #lightbox {
      display: none; position: fixed; z-index: 1000; left: 0; top: 0;
      width: 100%; height: 100%; background: rgba(6, 9, 17, 0.98);
      justify-content: center; align-items: center; user-select: none;
    }
    .lightbox-content-wrapper { position: relative; max-width: 85%; max-height: 80%; display: flex; justify-content: center; align-items: center; }
    #lightboxMediaItem img, #lightboxMediaItem video { max-width: 100%; max-height: 82vh; border-radius: 12px; transition: transform 0.2s; }
    .close-lightbox { position: absolute; top: -50px; right: 0; font-size: 28px; color: #fff; background: none; border: none; cursor: pointer; }

    /* Media Zoom Module CSS */
    .zoom-controls { position: absolute; top: -54px; left: 0; display: flex; gap: 10px; }
    .zoom-btn { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; padding: 8px 12px; border-radius: 8px; cursor: pointer; font-size: 14px; }

    /* Lightbox Swipe/Scroll Module */
    .nav-btn { position: absolute; top: 50%; transform: translateY(-50%); background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255,255,255,0.1); color: #fff; font-size: 20px; width: 46px; height: 46px; border-radius: 50%; cursor: pointer; display: flex; justify-content: center; align-items: center; z-index: 1005; }
    .prev-btn { left: -65px; } .next-btn { right: -65px; }

    /* Responsive adjustments */
    @media (max-width: 768px) {
      #gallery { grid-template-columns: 1fr; padding: 15px; }
      .nav-btn { width: 38px; height: 38px; }
      .prev-btn { left: -15px; background: rgba(0,0,0,0.6); }
      .next-btn { right: -15px; background: rgba(0,0,0,0.6); }
    }
  </style>
</head>

<body>

  <audio id="bgMusic" loop src="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"></audio>

  <div class="auth-overlay" id="authModal">
    <div class="auth-card">
      <div style="font-size: 40px; margin-bottom: 15px;">✨</div>
      <h2 id="authTitle">Welcome Hub</h2>
      <p class="subtitle" id="authSubtitle">Please log in to manage your premium media dashboard</p>
      
      <input type="text" id="authUsername" placeholder="Enter Username">
      <input type="password" id="authPassword" placeholder="Enter Password Key">
      
      <button class="auth-submit-btn" onclick="processAuthSubmit()">Authenticate & Enter</button>
      
      <p style="text-align: center; font-size: 13px; margin-top: 20px; cursor: pointer; color: var(--primary-blue); font-weight: 500;" onclick="toggleAuthType()">
        Don't have an account? Register Here
      </p>
    </div>
  </div>

  <div id="mainAppContent">
    <header>
      <h1>✨ Premium Media Hub</h1>
      <div class="header-actions">
        <button class="btn-icon" id="musicToggle" onclick="toggleMusic()" title="Play Background Music"><i class="fa-solid fa-music"></i></button>
        <button class="btn-icon" id="themeToggle" onclick="toggleTheme()" title="Switch Theme"><i class="fa-solid fa-moon"></i></button>
        
        <div class="user-profile-badge" id="profileBadge" onclick="handleProfileClick()" title="Click to View Profile or Logout">
          <i class="fa-solid fa-user-circle"></i> <span id="profileName">Guest</span>
        </div>
      </div>
    </header>

    <div class="top-controls">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchBar" placeholder="Live search files, titles, albums..." oninput="filterGallery()">
      </div>
    </div>

    <div class="categories">
      <button class="cat-btn active" onclick="switchCategory('all', this)">All Feeds</button>
      <button class="cat-btn" onclick="switchCategory('General', this)">General</button>
      <button class="cat-btn" onclick="switchCategory('Friends', this)">Friend's</button>
      <button class="cat-btn" onclick="switchCategory('Travel', this)">Travel</button>
      <button class="cat-btn" onclick="switchCategory('Work', this)">Work</button>
    </div>

    <div id="gallery"></div>

    <div class="fab-container">
      <div class="upload-options-panel" id="uploadPanel">
        <h4>📂 Upload Dashboard</h4>
        <select id="albumSelect">
          <option value="General">General</option>
          <option value="Friend's">Friend's</option>
          <option value="Travel">Travel</option>
          <option value="Work">Work</option>
        </select>
        <input type="file" id="mediaUpload" accept="image/*,video/*" multiple>
        <div style="display:flex; gap:5px; align-items:center; font-size:11px;">
          <input type="checkbox" id="encryptStatus" style="width:auto; margin:0;"> Lock items with Password
        </div>
      </div>
      <div class="fab" onclick="toggleUploadPanel()"><i class="fa-solid fa-plus"></i></div>
    </div>
  </div>

  <div id="lightbox">
    <div class="lightbox-content-wrapper">
      <div class="zoom-controls">
        <button class="zoom-btn" onclick="zoomMedia(0.2)"><i class="fa-solid fa-plus"></i></button>
        <button class="zoom-btn" onclick="zoomMedia(-0.2)"><i class="fa-solid fa-minus"></i></button>
        <button class="zoom-btn" onclick="resetZoom()"><i class="fa-solid fa-sync-alt"></i></button>
      </div>
      <button class="close-lightbox" onclick="closeLightbox()">&times;</button>
      <button class="nav-btn prev-btn" onclick="navigateLightbox(-1)"><i class="fa-solid fa-chevron-left"></i></button>
      <div id="lightboxMediaItem"></div>
      <button class="nav-btn next-btn" onclick="navigateLightbox(1)"><i class="fa-solid fa-chevron-right"></i></button>
    </div>
  </div>

  <script>
    let db;
    let currentCategory = "all";
    let loadedItems = [];
    let currentLightboxIndex = -1;
    let currentScale = 1;
    let isMusicPlaying = false;
    let isAuthModeLogin = true;

    const request = indexedDB.open("PremiumGalleryDB", 1);
    request.onupgradeneeded = function(e) {
      db = e.target.result;
      if (!db.objectStoreNames.contains("media")) {
        db.createObjectStore("media", { keyPath: "id", autoIncrement: true });
      }
    };
    request.onsuccess = function(e) {
      db = e.target.result;
      checkSessionUser();
    };

    function toggleTheme() {
      const currentTheme = document.documentElement.getAttribute("data-theme");
      const targetTheme = currentTheme === "light" ? "dark" : "light";
      document.documentElement.setAttribute("data-theme", targetTheme);
      document.getElementById("themeToggle").innerHTML = targetTheme === "light" ? `<i class="fa-solid fa-sun"></i>` : `<i class="fa-solid fa-moon"></i>`;
    }

    function toggleMusic() {
      const audio = document.getElementById("bgMusic");
      const btn = document.getElementById("musicToggle");
      if(isMusicPlaying) {
        audio.pause();
        btn.style.color = "var(--text-main)";
      } else {
        audio.play().catch(e => console.log("Interaction required first"));
        btn.style.color = "var(--accent-share)";
      }
      isMusicPlaying = !isMusicPlaying;
    }

    // UPDATED: Handle Profile View and Logout Management
    function handleProfileClick() {
      const savedUser = localStorage.getItem("session_user");
      if (savedUser) {
        if (confirm(`👤 Active Profile User: ${savedUser}\n\nक्या आप लॉग आउट करना चाहते हैं?`)) {
          localStorage.removeItem("session_user");
          
          // Lock down app and force show login dashboard again
          document.getElementById("mainAppContent").style.display = "none";
          document.getElementById("authModal").style.display = "flex";
          
          document.getElementById("authUsername").value = "";
          document.getElementById("authPassword").value = "";
          alert("आप सफलतापूर्वक लॉग आउट हो चुके हैं।");
        }
      }
    }

    function toggleAuthType() {
      isAuthModeLogin = !isAuthModeLogin;
      document.getElementById("authTitle").innerText = isAuthModeLogin ? "Secure Core Login" : "Create Master Identity Account";
      document.getElementById("authSubtitle").innerText = isAuthModeLogin ? "Please log in to manage your premium media dashboard" : "Register a new master profile identity key";
    }
    
    // NEW & UPDATED: Process submission and open the dashboard layout
    function processAuthSubmit() {
      const user = document.getElementById("authUsername").value.trim();
      const pass = document.getElementById("authPassword").value.trim();
      
      if(!user || !pass) return alert("कृपया यूजरनेम और पासवर्ड दोनों दर्ज करें!");
      
      localStorage.setItem("session_user", user);
      document.getElementById("profileName").innerText = user;
      
      // Hide login overlay dashboard, expose application grid mapping
      document.getElementById("authModal").style.display = "none";
      document.getElementById("mainAppContent").style.display = "block";
      
      alert(`सफलतापूर्वक प्रमाणीकरण! स्वागत है, ${user}।`);
      renderGallery();
    }
    
    // Check state on fresh browser instantiation
    function checkSessionUser() {
      const savedUser = localStorage.getItem("session_user");
      if(savedUser) {
        document.getElementById("profileName").innerText = savedUser;
        document.getElementById("authModal").style.display = "none";
        document.getElementById("mainAppContent").style.display = "block";
        renderGallery();
      } else {
        document.getElementById("authModal").style.display = "flex";
        document.getElementById("mainAppContent").style.display = "none";
      }
    }

    function toggleUploadPanel() {
      const panel = document.getElementById("uploadPanel");
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    }

    function switchCategory(category, element) {
      currentCategory = category;
      document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');
      renderGallery();
    }

    function renderGallery(filterText = "") {
      if (!db) return;
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";
      const query = filterText.toLowerCase();

      const transaction = db.transaction(["media"], "readonly");
      const store = transaction.objectStore("media");
      store.getAll().onsuccess = function(e) {
        const items = e.target.result;
        loadedItems = [];
        
        items.forEach((item) => {
          if (currentCategory !== "all" && item.album !== currentCategory) return;
          if (query && !item.name.toLowerCase().includes(query)) return;

          loadedItems.push(item);
          const idx = loadedItems.length - 1;

          const card = document.createElement("div");
          card.className = "photo-card";
          const isVideo = item.type && item.type.startsWith("video");

          let mediaTag = isVideo 
            ? `<video src="${item.url}" muted onclick="launchActiveLightbox(${idx})"></video><span class="video-badge"><i class="fa-solid fa-video"></i></span>`
            : `<img src="${item.url}" alt="Media" onclick="launchActiveLightbox(${idx})">`;

          let commentsHtml = (item.comments || []).map(c => `<div class="comment-item"><b>User:</b> ${c}</div>`).join("");

          card.innerHTML = `
            <div class="media-container">${mediaTag}</div>
            <div class="card-info">
              <h3>${item.isLocked ? "🔒 Locked Security Object File" : item.name}</h3>
              <span class="album-tag"><i class="fa-regular fa-folder"></i> ${item.album}</span>
            </div>
            <div class="social-row">
              <div class="social-actions">
                <button class="action-icon-btn ${item.liked ? 'liked' : ''}" onclick="toggleLike(${item.id})">
                  <i class="fa-${item.liked ? 'solid' : 'regular'} fa-heart"></i> <span>${item.likes || 0}</span>
                </button>
                <button class="action-icon-btn" onclick="document.getElementById('comment-in-${item.id}').focus()">
                  <i class="fa-regular fa-comment"></i> <span>${item.comments ? item.comments.length : 0}</span>
                </button>
              </div>
              <div class="social-actions">
                <button class="action-icon-btn" style="color:var(--accent-share)" onclick="shareObject('${item.name}')"><i class="fa-solid fa-share-nodes"></i></button>
                <button class="action-icon-btn" style="color:var(--accent-download)" onclick="downloadMedia('${item.url}', '${item.name}')"><i class="fa-solid fa-download"></i></button>
                <button class="action-icon-btn" style="color:var(--accent-like)" onclick="deleteMedia(${item.id})"><i class="fa-regular fa-trash-can"></i></button>
              </div>
            </div>
            <div class="comments-summary">
              <div class="comments-list">${commentsHtml}</div>
              <div class="comment-input-box">
                <input type="text" id="comment-in-${item.id}" placeholder="Add comment..." onkeydown="if(event.key === 'Enter') addComment(${item.id})">
              </div>
            </div>
          `;
          gallery.appendChild(card);
        });
      };
    }

    function filterGallery() { renderGallery(document.getElementById("searchBar").value); }

    document.getElementById("mediaUpload").addEventListener("change", function (event) {
      const files = event.target.files;
      const album = document.getElementById("albumSelect").value;
      const isLocked = document.getElementById("encryptStatus").checked;

      Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = function (e) {
          const transaction = db.transaction(["media"], "readwrite");
          const store = transaction.objectStore("media");
          
          store.add({
            name: file.name,
            album: album,
            url: e.target.result,
            type: file.type,
            likes: 0,
            liked: false,
            isLocked: isLocked,
            comments: []
          });
          transaction.oncomplete = function() { renderGallery(); };
        };
        reader.readAsDataURL(file);
      });
      toggleUploadPanel();
    });

    function updateItem(id, updateCallback) {
      const transaction = db.transaction(["media"], "readwrite");
      const store = transaction.objectStore("media");
      store.get(id).onsuccess = function(e) {
        const item = e.target.result;
        updateCallback(item);
        store.put(item);
      };
      transaction.oncomplete = function() { renderGallery(); };
    }

    function toggleLike(id) {
      updateItem(id, function(item) {
        item.liked = !item.liked;
        item.likes = (item.likes || 0) + (item.liked ? 1 : -1);
      });
    }

    function addComment(id) {
      const input = document.getElementById(`comment-in-${id}`);
      if (input.value.trim() !== "") {
        const text = input.value.trim();
        updateItem(id, function(item) {
          if (!item.comments) item.comments = [];
          item.comments.push(text);
        });
        input.value = "";
      }
    }

    function deleteMedia(id) {
      if(confirm("Delete this file permanently?")) {
        const transaction = db.transaction(["media"], "readwrite");
        transaction.objectStore("media").delete(id);
        transaction.oncomplete = function() { renderGallery(); };
      }
    }

    function downloadMedia(url, filename) {
      const a = document.createElement("a"); a.href = url; a.download = filename || "download";
      document.body.appendChild(a); a.click(); document.body.removeChild(a);
    }

    function shareObject(title) {
      if (navigator.share) { navigator.share({ title: title, url: window.location.href }).catch(err => console.log(err)); } 
      else { navigator.clipboard.writeText(window.location.href); alert("Link copied!"); }
    }

    function launchActiveLightbox(idx) {
      if(idx < 0 || idx >= loadedItems.length) return;
      const targetObj = loadedItems[idx];
      if(targetObj.isLocked) { const verifyPass = prompt("Enter Object Passkey to Unlock Data:"); if(!verifyPass) return; }
      currentLightboxIndex = idx; resetZoom();
      const viewerContainer = document.getElementById("lightboxMediaItem");
      const isVideo = targetObj.type && targetObj.type.startsWith("video");
      if (isVideo) { viewerContainer.innerHTML = `<video id="activeMedia" src="${targetObj.url}" controls autoplay></video>`; } 
      else { viewerContainer.innerHTML = `<img id="activeMedia" src="${targetObj.url}" alt="View">`; }
      document.getElementById("lightbox").style.display = "flex";
    }

    function navigateLightbox(dir) { let nextIndex = currentLightboxIndex + dir; if (nextIndex >= 0 && nextIndex < loadedItems.length) launchActiveLightbox(nextIndex); }
    function zoomMedia(amount) { const media = document.getElementById("activeMedia"); if (!media || media.tagName === "VIDEO") return; currentScale += amount; if (currentScale < 0.6) currentScale = 0.6; if (currentScale > 3.5) currentScale = 3.5; media.style.transform = `scale(${currentScale})`; }
    function resetZoom() { const media = document.getElementById("activeMedia"); if (media) media.style.transform = `scale(1)`; }
    function closeLightbox() { document.getElementById("lightboxMediaItem").innerHTML = ""; document.getElementById("lightbox").style.display = "none"; }

    document.addEventListener("keydown", function(e) {
      if (document.getElementById("lightbox").style.display === "flex") {
        if (e.key === "ArrowRight") navigateLightbox(1);
        if (e.key === "ArrowLeft") navigateLightbox(-1);
        if (e.key === "Escape") closeLightbox();
      }
    });
  </script>
</body>
</html>
