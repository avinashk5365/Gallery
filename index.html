<!DOCTYPE html>
<html>

<head>
  <title>Advanced Photo Gallery</title>
  <style>
    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1f1c2c, #928dab);
      margin: 0;
      padding: 0;
      color: #fff;
    }

    header {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      padding: 20px;
      text-align: center;
      font-size: 28px;
      letter-spacing: 2px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
    }

    #controls {
      text-align: center;
      margin: 20px;
    }

    input,
    select {
      margin: 5px;
      padding: 10px 15px;
      font-size: 14px;
      border-radius: 8px;
      border: none;
      outline: none;
    }

    #categoryButtons {
      text-align: center;
      margin: 20px;
    }

    #categoryButtons button {
      margin: 5px;
      padding: 10px 20px;
      font-size: 14px;
      border-radius: 8px;
      border: none;
      background: #4A90E2;
      color: white;
      cursor: pointer;
      transition: 0.3s;
    }

    #categoryButtons button:hover {
      background: #357ABD;
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(240px, 1fr));
      gap: 20px;
      margin: 20px;
      padding: 10px;
    }

    .photo-card {
      background: rgba(255, 255, 255, 0.1);
      backdrop-filter: blur(10px);
      border-radius: 15px;
      overflow: hidden;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
      transition: transform 0.3s;
      cursor: pointer;
    }

    .photo-card:hover {
      transform: scale(1.05);
    }

    .photo-card img {
      width: 100%;
      height: 200px;
      object-fit: cover;
    }

    .photo-card p {
      margin: 10px;
      font-size: 14px;
      color: #fff;
    }

    .actions {
      display: flex;
      justify-content: space-around;
      padding: 10px;
    }

    .actions button {
      font-size: 12px;
      padding: 5px 10px;
      background: #ff6f61;
      border: none;
      border-radius: 5px;
      color: white;
      cursor: pointer;
    }

    .actions button:hover {
      background: #e85c50;
    }

    /* Lightbox */
    #lightbox {
      display: none;
      position: fixed;
      z-index: 999;
      left: 0;
      top: 0;
      width: 100%;
      height: 100%;
      background: rgba(0, 0, 0, 0.9);
      justify-content: center;
      align-items: center;
    }

    #lightbox img {
      max-width: 90%;
      max-height: 90%;
      border: 5px solid white;
      border-radius: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.5);
    }

    #lightbox span {
      position: absolute;
      top: 20px;
      right: 40px;
      font-size: 40px;
      color: white;
      cursor: pointer;
    }
  </style>
</head>

<body>
  <header>🌟 My Advanced Photo Gallery 🌟</header>

  <!-- Upload -->
  <div id="controls">
    <input type="file" id="upload" accept="image/*" multiple>
    <select id="album">
      <option value="General">General</option>
      <option value="Family">Friend's</option>
      <option value="Travel">Travel</option>
      <option value="Work">Work</option>
    </select>
  </div>

  <!-- Category Buttons -->
  <div id="categoryButtons">
    <button onclick="renderGallery('all')">All</button>
    <button onclick="renderGallery('Family')">Friend's</button>
    <button onclick="renderGallery('Travel')">Travel</button>
    <button onclick="renderGallery('Work')">Work</button>
    <button onclick="renderGallery('General')">General</button>
  </div>

  <!-- Gallery -->
  <div id="gallery"></div>

  <!-- Lightbox -->
  <div id="lightbox">
    <span onclick="closeLightbox()">&times;</span>
    <img id="lightboxImg" src="">
  </div>

  <script>
    let photos = JSON.parse(localStorage.getItem("photos")) || [];

    function renderGallery(category = "all") {
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";
      photos.forEach((photo, index) => {
        if (category === "all" || photo.album === category) {
          const card = document.createElement("div");
          card.className = "photo-card";
          card.innerHTML = `
            <img src="${photo.url}" alt="Photo" onclick="openLightbox('${photo.url}')">
            <p>${photo.name} <br><b>Album:</b> ${photo.album}</p>
            <div class="actions">
              <button onclick="deletePhoto(${index})">Delete</button>
            </div>
          `;
          gallery.appendChild(card);
        }
      });
    }

    document.getElementById("upload").addEventListener("change", function (event) {
      const files = event.target.files;
      const album = document.getElementById("album").value;
      Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = function (e) {
          photos.push({ name: file.name, album: album, url: e.target.result });
          localStorage.setItem("photos", JSON.stringify(photos));
          renderGallery();
        };
        reader.readAsDataURL(file);
      });
    });

    function deletePhoto(index) {
      photos.splice(index, 1);
      localStorage.setItem("photos", JSON.stringify(photos));
      renderGallery();
    }

    function openLightbox(url) {
      document.getElementById("lightboxImg").src = url;
      document.getElementById("lightbox").style.display = "flex";
    }

    function closeLightbox() {
      document.getElementById("lightbox").style.display = "none";
    }

    renderGallery();
  </script>
</body>

</html>
