<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Social Photo & Video Gallery</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>

  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-blur: blur(12px);
      --glass-border: rgba(255, 255, 255, 0.15);
      --accent-color: #ff4757;
      --primary-blue: #4a90e2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c20, #15102a, #060409);
      min-height: 100vh;
      color: #fff;
      padding-bottom: 90px;
    }

    #mainAppContent {
      display: none;
    }

    header {
      background: rgba(15, 12, 32, 0.5);
      backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--glass-border);
      padding: 20px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    header h1 {
      font-size: 24px;
      font-weight: 600;
      background: linear-gradient(45deg, #ff7675, #74b9ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .logout-btn {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: white;
      padding: 8px 15px;
      border-radius: 15px;
      cursor: pointer;
      font-size: 13px;
      transition: 0.3s;
    }
    .logout-btn:hover { background: #ff4757; border-color: #ff4757; }

    /* AUTH OVERLAY */
    .auth-overlay {
      position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: #0f0c20; display: flex; justify-content: center; align-items: center; z-index: 999;
    }
    .auth-card {
      background: rgba(255, 255, 255, 0.03); backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border); padding: 35px; border-radius: 20px;
      width: 100%; max-width: 400px; text-align: center; box-shadow: 0 15px 35px rgba(0,0,0,0.5);
    }
    .auth-card h2 { margin-bottom: 8px; font-size: 24px; color: #74b9ff; }
    .auth-card p.subtitle { font-size: 13px; color: #aaa; margin-bottom: 20px; }
    .auth-card input {
      width: 100%; padding: 12px; margin-bottom: 15px; background: rgba(0,0,0,0.3);
      border: 1px solid var(--glass-border); color: white; border-radius: 10px; outline: none; font-size: 14px;
    }
    .auth-card input:focus { border-color: var(--primary-blue); }
    
    .auth-submit-btn {
      width: 100%; padding: 12px; background: var(--primary-blue); color: white;
      border: none; border-radius: 10px; font-weight: 600; cursor: pointer; transition: 0.2s; font-size: 14px;
    }
    .auth-submit-btn:hover { opacity: 0.9; }

    #otpSection, #forgotSection { display: none; border-top: 1px dashed var(--glass-border); padding-top: 15px; margin-top: 10px; }
    .otp-alert-box { background: rgba(74, 144, 226, 0.15); border: 1px solid var(--primary-blue); color: #fff; padding: 10px; border-radius: 8px; font-size: 12px; margin-bottom: 15px; }

    .top-controls {
      max-width: 600px;
      margin: 20px auto;
      padding: 0 15px;
    }

    .search-box {
      display: flex;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 5px 15px;
      align-items: center;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      width: 100%;
      padding: 10px 0;
      font-size: 15px;
    }

    .search-box i { color: #a0a0a0; margin-right: 10px; }

    .categories {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 10px 15px;
      max-width: 800px;
      margin: 0 auto;
      scroll-behavior: smooth;
      -webkit-overflow-scrolling: touch;
    }
    .categories::-webkit-scrollbar {
      display: none;
    }

    .cat-btn {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: #ccc;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: 0.3s;
    }

    .cat-btn.active, .cat-btn:hover {
      background: var(--primary-blue);
      color: white;
      border-color: var(--primary-blue);
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .photo-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .media-container {
      position: relative;
      width: 100%;
      height: 230px;
      overflow: hidden;
      background: #000;
    }

    .media-container img, .media-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: pointer;
    }

    .video-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.7);
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 12px;
      pointer-events: none;
    }

    .card-info { padding: 15px; }
    .card-info h3 { font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-info .album-tag { font-size: 12px; color: #a0a0a0; }

    .social-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .social-actions { display: flex; gap: 15px; }

    .action-icon-btn {
      background: none;
      border: none;
      color: #b0b0b0;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .action-icon-btn.liked i { color: var(--accent-color); }

    .comments-summary { padding: 0 15px 15px 15px; font-size: 12px; }
    
    .comments-list-box {
      max-height: 60px; 
      overflow-y: auto;
      scroll-behavior: smooth;
      padding-right: 5px;
    }
    .comments-list-box::-webkit-scrollbar {
      width: 4px;
    }
    .comments-list-box::-webkit-scrollbar-thumb {
      background: var(--glass-border);
      border-radius: 10px;
    }

    .comment-input-box { display: flex; gap: 5px; margin-top: 8px; }
    .comment-input-box input {
      flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
      border-radius: 15px; padding: 6px 12px; color: white; font-size: 12px;
    }

    .fab-container { position: fixed; bottom: 25px; right: 25px; z-index: 200; display: flex; flex-direction: column; align-items: flex-end; gap: 15px; }
    .upload-options-panel {
      background: rgba(20, 15, 38, 0.95); border: 1px solid var(--glass-border);
      padding: 15px; border-radius: 20px; display: none;
    }

    .upload-options-panel select, .upload-options-panel input {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      color: white; padding: 8px; margin-bottom: 10px; border-radius: 8px;
    }

    .fab {
      width: 60px; height: 60px; background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      border-radius: 50%; display: flex; justify-content: center; align-items: center;
      font-size: 24px; color: white; cursor: pointer; box-shadow: 0 5px 20px rgba(108, 92, 231, 0.4);
    }

    #lightbox {
      display: none; position: fixed; z-index: 1000; left: 0; top: 0;
      width: 100%; height: 100%; background: rgba(5, 3, 10, 0.98);
      justify-content: center; align-items: center;
    }

    .lightbox-content-wrapper { position: relative; max-width: 90%; max-height: 80%; }
    #lightbox img, #lightbox video { max-width: 100%; max-height: 85vh; border-radius: 12px; }
    .close-lightbox { position: absolute; top: -50px; right: 10px; font-size: 30px; color: white; background: none; border: none; cursor: pointer; }
  </style>
</head>

<body>

  <div class="auth-overlay" id="authGateway">
    <div class="auth-card">
      <div style="font-size: 35px; margin-bottom: 10px;">🔐</div>
      <h2 id="authFormTitle">Account Login</h2>
      <p class="subtitle" id="authFormSubtitle">Enter Gmail ID or 10-digit Mobile No.</p>
      
      <div id="credentialBlock">
        <input type="text" id="authIdentity" placeholder="Gmail ID or 10-digit Mobile No.">
        <input type="password" id="authPassword" placeholder="Enter Secure Password">
        <button class="auth-submit-btn" onclick="validateAndRequestOTP()">Verify Credentials</button>
        
        <div style="margin-top: 15px; font-size: 13px; display: flex; justify-content: space-between;">
          <span style="color: #74b9ff; cursor: pointer;" onclick="toggleAuthMode()" id="switchAuthBtn">Don't have account? Register</span>
          <span style="color: #ff7675; cursor: pointer;" onclick="openForgotBlock()">Forgot Password?</span>
        </div>
      </div>

      <div id="otpSection">
        <div class="otp-alert-box" id="otpDisplayAlert"></div>
        <input type="text" id="authOtpInput" placeholder="Enter 4-Digit Security OTP" maxlength="4">
        <button class="auth-submit-btn" style="background: #2ecc71;" onclick="verifyOtpAndLogin()">Verify OTP & Unlock Hub</button>
        <button class="auth-submit-btn" style="background: transparent; border: 1px solid var(--glass-border); margin-top: 8px; font-size: 12px;" onclick="resetAuthScreen()">Back</button>
      </div>

      <div id="forgotSection">
        <p style="font-size:12px; margin-bottom:10px; color:#aaa;">Verify your ID first to reset your password.</p>
        <input type="text" id="forgotIdentity" placeholder="Confirm your registered Gmail/Mobile No.">
        <div id="forgotOtpVerification" style="display:none;">
          <div class="otp-alert-box" id="forgotOtpDisplay"></div>
          <input type="text" id="forgotOtpInput" placeholder="Enter Reset OTP Code" maxlength="4">
          <input type="password" id="forgotNewPassword" placeholder="Enter New Secure Password">
        </div>
        <button class="auth-submit-btn" id="forgotActionBtn" onclick="processForgotPasswordVerify()">Verify Identity</button>
        <button class="auth-submit-btn" style="background: transparent; border: 1px solid var(--glass-border); margin-top: 8px; font-size: 12px;" onclick="resetAuthScreen()">Cancel</button>
      </div>
    </div>
  </div>

  <div id="mainAppContent">
    <header>
      <h1>🌟 Premium Media Hub</h1>
      <button class="logout-btn" onclick="logoutSession()">Log Out <i class="fa-solid fa-right-from-bracket"></i></button>
    </header>

    <div class="top-controls">
      <div class="search-box">
        <i class="fa-solid fa-magnifying-glass"></i>
        <input type="text" id="searchBar" placeholder="Search photos or videos..." oninput="filterGallery()">
      </div>
    </div>

    <div class="categories">
      <button class="cat-btn active" onclick="switchCategory('all', this)">All</button>
      <button class="cat-btn" onclick="switchCategory('General', this)">General</button>
      <button class="cat-btn" onclick="switchCategory('Friends', this)">Friend's</button>
      <button class="cat-btn" onclick="switchCategory('Travel', this)">Travel</button>
      <button class="cat-btn" onclick="switchCategory('Work', this)">Work</button>
    </div>

    <div id="gallery"></div>

    <div class="fab-container">
      <div class="upload-options-panel" id="uploadPanel">
        <select id="albumSelect">
          <option value="General">General</option>
          <option value="Friends">Friend's</option>
          <option value="Travel">Travel</option>
          <option value="Work">Work</option>
        </select>
        <input type="file" id="mediaUpload" accept="image/*,video/*" multiple>
      </div>
      <div class="fab" onclick="toggleUploadPanel()"><i class="fa-solid fa-plus"></i></div>
    </div>

    <div id="lightbox">
      <div class="lightbox-content-wrapper">
        <button class="close-lightbox" onclick="closeLightbox()">&times;</button>
        <div id="lightboxMediaItem"></div>
      </div>
    </div>
  </div>

  <script>
    // --- FIREBASE CONFIGURATION ---
    const firebaseConfig = {
      apiKey: "AIzaSyDKz1U6zxggWBnbYZSl9RgIUca8rihcGzM",
      authDomain: "my-public-gallery-42e95.firebaseapp.com",
      projectId: "my-public-gallery-42e95",
      storageBucket: "my-public-gallery-42e95.firebasestorage.app",
      messagingSenderId: "727898221593",
      appId: "1:727898221593:web:65f30cc2e2a303b03e0e88",
      databaseURL: "https://my-public-gallery-42e95-default-rtdb.firebaseio.com/" 
    };

    firebase.initializeApp(firebaseConfig);
    const rtdb = firebase.database();

    let currentCategory = "all";
    let isLoginMode = true;
    let generatedOtp = null;
    let validatedIdentity = null;
    let validatedPassword = null;
    let forgotGeneratedOtp = null;
    let forgotStage = 1;

    // पेज लोड होने पर सेशन चेक करें
    window.onload = function() {
      checkUserSessionGate();
    };

    function checkUserSessionGate() {
      const activeSession = sessionStorage.getItem("app_authenticated");
      if(activeSession) {
        document.getElementById("authGateway").style.display = "none";
        document.getElementById("mainAppContent").style.display = "block";
        renderGallery();
      } else {
        document.getElementById("authGateway").style.display = "flex";
        document.getElementById("mainAppContent").style.display = "none";
      }
    }

    function toggleAuthMode() {
      isLoginMode = !isLoginMode;
      document.getElementById("authFormTitle").innerText = isLoginMode ? "Account Login" : "Register Account";
      document.getElementById("authFormSubtitle").innerText = isLoginMode ? "Enter Gmail ID or 10-digit Mobile No." : "Create Identity using Gmail or Number";
      document.getElementById("switchAuthBtn").innerText = isLoginMode ? "Don't have account? Register" : "Already registered? Login";
    }

    function resetAuthScreen() {
      document.getElementById("credentialBlock").style.display = "block";
      document.getElementById("otpSection").style.display = "none";
      document.getElementById("forgotSection").style.display = "none";
      document.getElementById("forgotOtpVerification").style.display = "none";
      document.getElementById("authOtpInput").value = "";
      document.getElementById("forgotOtpInput").value = "";
      document.getElementById("forgotNewPassword").value = "";
      document.getElementById("forgotIdentity").value = "";
      forgotStage = 1;
      document.getElementById("forgotActionBtn").innerText = "Verify Identity";
      generatedOtp = null;
      forgotGeneratedOtp = null;
    }

    function openForgotBlock() {
      document.getElementById("credentialBlock").style.display = "none";
      document.getElementById("otpSection").style.display = "none";
      document.getElementById("forgotSection").style.display = "block";
    }

    function validateAndRequestOTP() {
      const identity = document.getElementById("authIdentity").value.trim();
      const password = document.getElementById("authPassword").value.trim();

      if(!identity || !password) {
        return alert("कृपया सभी इनपुट फील्ड्स को पूरा भरें!");
      }

      const gmailCheck = /^[a-zA-Z0-9._%+-]+@gmail\.com$/;
      const mobileCheck = /^[0-9]{10}$/;

      if(!gmailCheck.test(identity) && !mobileCheck.test(identity)) {
        return alert("❌ अमान्य एंट्री! कृपया सही Gmail ID या 10 अंकों का मोबाइल नंबर डालें।");
      }

      const safeKey = identity.replace(/[.#$[\]]/g, "_");

      rtdb.ref('users/' + safeKey).once('value').then((snapshot) => {
        const userData = snapshot.val();

        if(isLoginMode) {
          if(!userData) {
            return alert("❌ यह यूजर आईडी रजिस्टर्ड नहीं है! कृपया पहले 'Register' करें।");
          }
          if(userData.password !== password) {
            return alert("❌ गलत पासवर्ड!");
          }
        } else {
          if(userData) {
            return alert("यह आईडी पहले से रजिस्टर्ड है!");
          }
        }

        generatedOtp = Math.floor(1000 + Math.random() * 9000).toString();
        validatedIdentity = identity;
        validatedPassword = password;

        document.getElementById("credentialBlock").style.display = "none";
        document.getElementById("otpSection").style.display = "block";
        document.getElementById("otpDisplayAlert").innerHTML = `📨 <b>लॉगिन सुरक्षा ओटीपी:</b> <span style="font-size:18px; font-weight:700; color:#fff; background:#ff4757; padding:2px 8px; border-radius:5px; margin-left:5px; letter-spacing:2px;">${generatedOtp}</span>`;
      }).catch((err) => {
        alert("डेटाबेस से कनेक्ट करने में त्रुटि: " + err.message);
      });
    }

    function verifyOtpAndLogin() {
      const typedOtp = document.getElementById("authOtpInput").value.trim();
      if(!typedOtp) return alert("कृपया प्राप्त हुआ ओटीपी दर्ज करें!");

      if(typedOtp !== generatedOtp) {
        return alert("❌ अमान्य ओटीपी कोड!");
      }

      const safeKey = validatedIdentity.replace(/[.#$[\]]/g, "_");

      if(!isLoginMode) {
        rtdb.ref('users/' + safeKey).set({
          identity: validatedIdentity,
          password: validatedPassword
        }).then(() => {
          alert("✅ रजिस्ट्रेशन सफल! अब आप लॉगिन कर सकते हैं।");
          isLoginMode = true;
          toggleAuthMode();
          resetAuthScreen();
        }).catch((err) => {
          alert("रजिस्ट्रेशन सुरक्षित करने में विफलता: " + err.message);
        });
        return;
      }

      sessionStorage.setItem("app_authenticated", "true");
      sessionStorage.setItem("current_user", validatedIdentity);
      
      alert(`✅ ओटीपी प्रमाणित!`);
      resetAuthScreen();
      checkUserSessionGate();
    }

    function processForgotPasswordVerify() {
      const targetId = document.getElementById("forgotIdentity").value.trim();
      if(!targetId) return alert("कृपया अपना रजिस्टर्ड ईमेल या मोबाइल नंबर डालें!");
      const safeKey = targetId.replace(/[.#$[\]]/g, "_");

      if(forgotStage === 1) {
        rtdb.ref('users/' + safeKey).once('value').then((snapshot) => {
          if(!snapshot.exists()) {
            return alert("❌ इस नाम का कोई रिकॉर्ड डेटाबेस में मौजूद नहीं है।");
          }

          forgotGeneratedOtp = Math.floor(1000 + Math.random() * 9000).toString();
          document.getElementById("forgotOtpVerification").style.display = "block";
          document.getElementById("forgotOtpDisplay").innerHTML = `🗝️ <b>पासवर्ड रीसेट ओटीपी:</b> <span style="font-size:16px; background:#e67e22; padding:2px 6px; border-radius:4px;">${forgotGeneratedOtp}</span>`;
          document.getElementById("forgotActionBtn").innerText = "Reset Password Now";
          forgotStage = 2;
        });
      } 
      else if(forgotStage === 2) {
        const userOtp = document.getElementById("forgotOtpInput").value.trim();
        const newPass = document.getElementById("forgotNewPassword").value.trim();

        if(!userOtp || !newPass) return alert("कृपया ओटीपी और नया密码 दोनों दर्ज करें!");

        if(userOtp !== forgotGeneratedOtp) {
          return alert("❌ गलत रीसेट ओटीपी!");
        }

        rtdb.ref('users/' + safeKey).update({
          password: newPass
        }).then(() => {
          alert("🎉 पासवर्ड सफलतापूर्वक बदल दिया गया है!");
          resetAuthScreen();
        }).catch((err) => {
          alert("पासवर्ड रीसेट करने में समस्या आई: " + err.message);
        });
      }
    }

    function logoutSession() {
      if(confirm("क्या आप इस सत्र से लॉग आउट करना चाहते हैं?")) {
        sessionStorage.clear();
        checkUserSessionGate();
      }
    }

    // --- NEW CLOUD MEDIA BOARD (FIREBASE POWERED) ---
    function toggleUploadPanel() {
      const panel = document.getElementById("uploadPanel");
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    }

    function switchCategory(category, element) {
      currentCategory = category;
      document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');
      renderGallery();
    }

    // FIREBASE से मीडिया लोड करके रेंडर करना
    function renderGallery(filterText = "") {
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";
      const query = filterText.toLowerCase();

      const currentUser = sessionStorage.getItem("current_user");
      if(!currentUser) return;
      const safeKey = currentUser.replace(/[.#$[\]]/g, "_");

      rtdb.ref('user_gallery/' + safeKey).once('value').then((snapshot) => {
        if(!snapshot.exists()) return;

        snapshot.forEach((childSnapshot) => {
          const itemKey = childSnapshot.key;
          const item = childSnapshot.val();

          if (currentCategory !== "all" && item.album !== currentCategory) return;
          if (query && !item.name.toLowerCase().includes(query)) return;

          const card = document.createElement("div");
          card.className = "photo-card";
          const isVideo = item.type && item.type.startsWith("video");

          let mediaTag = isVideo 
            ? `<video src="${item.url}" muted onclick="openLightboxFromCloud('${itemKey}')"></video><span class="video-badge"><i class="fa-solid fa-video"></i></span>`
            : `<img src="${item.url}" alt="Media" onclick="openLightboxFromCloud('${itemKey}')">`;

          let commentsHtml = (item.comments || []).map(c => `<div><b>User:</b> ${c}</div>`).join("");

          card.innerHTML = `
            <div class="media-container">${mediaTag}</div>
            <div class="card-info">
              <h3>${item.name}</h3>
              <span class="album-tag"><i class="fa-regular fa-folder"></i> ${item.album}</span>
            </div>
            <div class="social-row">
              <div class="social-actions">
                <button class="action-icon-btn ${item.liked ? 'liked' : ''}" onclick="toggleLike('${itemKey}')">
                  <i class="fa-${item.liked ? 'solid' : 'regular'} fa-heart"></i> <span>${item.likes || 0}</span>
                </button>
                <button class="action-icon-btn" onclick="document.getElementById('comment-in-${itemKey}').focus()">
                  <i class="fa-regular fa-comment"></i> <span>${item.comments ? item.comments.length : 0}</span>
                </button>
                <button class="action-icon-btn" style="color:#2ecc71" onclick="shareMedia('${itemKey}', '${item.name}')" title="Share Content">
                  <i class="fa-solid fa-share-nodes"></i>
                </button>
              </div>
              <div class="social-actions">
                <button class="action-icon-btn" style="color:#74b9ff" onclick="downloadMedia('${item.url}', '${item.name}')"><i class="fa-solid fa-download"></i></button>
                <button class="action-icon-btn" style="color:#ff7675" onclick="deleteMedia('${itemKey}')"><i class="fa-regular fa-trash-can"></i></button>
              </div>
            </div>
            <div class="comments-summary">
              <div class="comments-list-box">${commentsHtml}</div>
              <div class="comment-input-box">
                <input type="text" id="comment-in-${itemKey}" placeholder="Add comment..." onkeydown="if(event.key === 'Enter') addComment('${itemKey}')">
              </div>
            </div>
          `;
          gallery.appendChild(card);
        });
      });
    }

    function filterGallery() {
      renderGallery(document.getElementById("searchBar").value);
    }

    // मीडिया को सीधे FIREBASE पर अपलोड करना
    document.getElementById("mediaUpload").addEventListener("change", function (event) {
      const files = event.target.files;
      const album = document.getElementById("albumSelect").value;
      const currentUser = sessionStorage.getItem("current_user");

      if(!files.length || !currentUser) return;
      const safeKey = currentUser.replace(/[.#$[\]]/g, "_");

      let uploadPromises = [];

      Array.from(files).forEach(file => {
        const reader = new FileReader();
        const promise = new Promise((resolve) => {
          reader.onload = function (e) {
            rtdb.ref('user_gallery/' + safeKey).push({
              name: file.name,
              album: album,
              url: e.target.result,
              type: file.type,
              likes: 0,
              liked: false,
              comments: []
            }).then(() => resolve());
          };
          reader.readAsDataURL(file);
        });
        uploadPromises.push(promise);
      });

      Promise.all(uploadPromises).then(() => {
        renderGallery();
      });
      toggleUploadPanel();
    });

    function toggleLike(itemKey) {
      const currentUser = sessionStorage.getItem("current_user");
      const safeKey = currentUser.replace(/[.#$[\]]/g, "_");
      const itemRef = rtdb.ref('user_gallery/' + safeKey + '/' + itemKey);

      itemRef.once('value').then((snapshot) => {
        const item = snapshot.val();
        const newLiked = !item.liked;
        const newLikes = (item.likes || 0) + (newLiked ? 1 : -1);

        itemRef.update({
          liked: newLiked,
          likes: newLikes
        }).then(() => renderGallery());
      });
    }

    function addComment(itemKey) {
      const input = document.getElementById(`comment-in-${itemKey}`);
      const text = input.value.trim();
      if (text === "") return;

      const currentUser = sessionStorage.getItem("current_user");
      const safeKey = currentUser.replace(/[.#$[\]]/g, "_");
      const itemRef = rtdb.ref('user_gallery/' + safeKey + '/' + itemKey);

      itemRef.once('value').then((snapshot) => {
        const item = snapshot.val();
        if (!item.comments) item.comments = [];
        item.comments.push(text);

        itemRef.update({
          comments: item.comments
        }).then(() => {
          input.value = "";
          renderGallery();
        });
      });
    }

    function deleteMedia(itemKey) {
      if(confirm("Delete this file permanently from Cloud?")) {
        const currentUser = sessionStorage.getItem("current_user");
        const safeKey = currentUser.replace(/[.#$[\]]/g, "_");
        
        rtdb.ref('user_gallery/' + safeKey + '/' + itemKey).remove().then(() => {
          renderGallery();
        });
      }
    }

    function downloadMedia(url, filename) {
      const a = document.createElement("a");
      a.href = url;
      a.download = filename || "download";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function shareMedia(itemKey, filename) {
      const currentUser = sessionStorage.getItem("current_user");
      const safeKey = currentUser.replace(/[.#$[\]]/g, "_");

      rtdb.ref('user_gallery/' + safeKey + '/' + itemKey).once('value').then((snapshot) => {
        const item = snapshot.val();
        if (navigator.share) {
          fetch(item.url)
            .then(res => res.blob())
            .then(blob => {
              const file = new File([blob], filename, { type: item.type });
              navigator.share({
                title: filename,
                text: `Check out this media from Premium Hub! Album: ${item.album}`,
                files: [file]
              }).catch(() => {
                navigator.share({
                  title: filename,
                  text: `Premium Gallery Item: ${filename} (Album: ${item.album})`,
                  url: window.location.href
                });
              });
            });
        } else {
          navigator.clipboard.writeText(window.location.href);
          alert("📋 लिंक क्लिपबोर्ड पर कॉपी हो गया है!");
        }
      });
    }

    function openLightboxFromCloud(itemKey) {
      const currentUser = sessionStorage.getItem("current_user");
      const safeKey = currentUser.replace(/[.#$[\]]/g, "_");

      rtdb.ref('user_gallery/' + safeKey + '/' + itemKey).once('value').then((snapshot) => {
        const item = snapshot.val();
        const viewerContainer = document.getElementById("lightboxMediaItem");
        const isVideo = item.type && item.type.startsWith("video");

        if (isVideo) {
          viewerContainer.innerHTML = `<video src="${item.url}" controls autoplay style="max-width:100%; max-height:85vh;"></video>`;
        } else {
          viewerContainer.innerHTML = `<img src="${item.url}" alt="View">`;
        }
        document.getElementById("lightbox").style.display = "flex";
      });
    }

    function closeLightbox() {
      document.getElementById("lightboxMediaItem").innerHTML = "";
      document.getElementById("lightbox").style.display = "none";
    }
  </script>
</body>
</html>
