<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Premium Social Photo & Video Gallery</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-blur: blur(12px);
      --glass-border: rgba(255, 255, 255, 0.15);
      --accent-color: #ff4757;
      --primary-blue: #4a90e2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c20, #15102a, #060409);
      min-height: 100vh;
      color: #fff;
      padding-bottom: 90px;
    }

    header {
      background: rgba(15, 12, 32, 0.5);
      backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--glass-border);
      padding: 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 24px;
      font-weight: 600;
      background: linear-gradient(45deg, #ff7675, #74b9ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .top-controls {
      max-width: 600px;
      margin: 20px auto;
      padding: 0 15px;
    }

    .search-box {
      display: flex;
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      border-radius: 30px;
      padding: 5px 15px;
      align-items: center;
    }

    .search-box input {
      background: transparent;
      border: none;
      outline: none;
      color: white;
      width: 100%;
      padding: 10px 0;
      font-size: 15px;
    }

    .search-box i { color: #a0a0a0; margin-right: 10px; }

    .categories {
      display: flex;
      gap: 10px;
      overflow-x: auto;
      padding: 10px 15px;
      max-width: 800px;
      margin: 0 auto;
    }

    .cat-btn {
      background: var(--glass-bg);
      border: 1px solid var(--glass-border);
      color: #ccc;
      padding: 10px 20px;
      border-radius: 20px;
      cursor: pointer;
      white-space: nowrap;
      transition: 0.3s;
    }

    .cat-btn.active, .cat-btn:hover {
      background: var(--primary-blue);
      color: white;
      border-color: var(--primary-blue);
    }

    #gallery {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
      gap: 25px;
      padding: 20px;
      max-width: 1200px;
      margin: 0 auto;
    }

    .photo-card {
      background: var(--glass-bg);
      backdrop-filter: var(--glass-blur);
      border: 1px solid var(--glass-border);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .media-container {
      position: relative;
      width: 100%;
      height: 230px;
      overflow: hidden;
      background: #000;
    }

    .media-container img, .media-container video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      cursor: pointer;
    }

    .video-badge {
      position: absolute;
      top: 12px;
      right: 12px;
      background: rgba(0,0,0,0.7);
      padding: 5px 8px;
      border-radius: 6px;
      font-size: 12px;
    }

    .card-info { padding: 15px; }
    .card-info h3 { font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-info .album-tag { font-size: 12px; color: #a0a0a0; }

    .social-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 15px;
      border-top: 1px solid rgba(255, 255, 255, 0.05);
    }

    .social-actions { display: flex; gap: 15px; }

    .action-icon-btn {
      background: none;
      border: none;
      color: #b0b0b0;
      cursor: pointer;
      font-size: 16px;
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .action-icon-btn.liked i { color: var(--accent-color); }

    .comments-summary { padding: 0 15px 15px 15px; font-size: 12px; }
    .comment-input-box { display: flex; gap: 5px; margin-top: 8px; }
    .comment-input-box input {
      flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border);
      border-radius: 15px; padding: 6px 12px; color: white; font-size: 12px;
    }

    .fab-container { position: fixed; bottom: 25px; right: 25px; z-index: 200; display: flex; flex-direction: column; align-items: flex-end; gap: 15px; }
    .upload-options-panel {
      background: rgba(20, 15, 38, 0.95); border: 1px solid var(--glass-border);
      padding: 15px; border-radius: 20px; display: none;
    }

    .upload-options-panel select, .upload-options-panel input {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border);
      color: white; padding: 8px; margin-bottom: 10px; border-radius: 8px;
    }

    .fab {
      width: 60px; height: 60px; background: linear-gradient(135deg, #6c5ce7, #a29bfe);
      border-radius: 50%; display: flex; justify-content: center; align-items: center;
      font-size: 24px; color: white; cursor: pointer; box-shadow: 0 5px 20px rgba(108, 92, 231, 0.4);
    }

    #lightbox {
      display: none; position: fixed; z-index: 1000; left: 0; top: 0;
      width: 100%; height: 100%; background: rgba(5, 3, 10, 0.98);
      justify-content: center; align-items: center;
    }

    .lightbox-content-wrapper { position: relative; max-width: 90%; max-height: 80%; }
    #lightbox img, #lightbox video { max-width: 100%; max-height: 85vh; border-radius: 12px; }
    .close-lightbox { position: absolute; top: -50px; right: 10px; font-size: 30px; color: white; background: none; border: none; cursor: pointer; }
  </style>
</head>

<body>

  <header>
    <h1>🌟 Premium Media Hub</h1>
  </header>

  <div class="top-controls">
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchBar" placeholder="Search photos or videos..." oninput="filterGallery()">
    </div>
  </div>

  <div class="categories">
    <button class="cat-btn active" onclick="switchCategory('all', this)">All</button>
    <button class="cat-btn" onclick="switchCategory('General', this)">General</button>
    <button class="cat-btn" onclick="switchCategory('Friends', this)">Friend's</button>
    <button class="cat-btn" onclick="switchCategory('Travel', this)">Travel</button>
    <button class="cat-btn" onclick="switchCategory('Work', this)">Work</button>
  </div>

  <div id="gallery"></div>

  <div class="fab-container">
    <div class="upload-options-panel" id="uploadPanel">
      <select id="albumSelect">
        <option value="General">General</option>
        <option value="Friend's">Friend's</option>
        <option value="Travel">Travel</option>
        <option value="Work">Work</option>
      </select>
      <input type="file" id="mediaUpload" accept="image/*,video/*" multiple>
    </div>
    <div class="fab" onclick="toggleUploadPanel()"><i class="fa-solid fa-plus"></i></div>
  </div>

  <div id="lightbox">
    <div class="lightbox-content-wrapper">
      <button class="close-lightbox" onclick="closeLightbox()">&times;</button>
      <div id="lightboxMediaItem"></div>
    </div>
  </div>

  <script>
    let db;
    let currentCategory = "all";

    // 1. Initialize IndexedDB (Powerful storage replacement for LocalStorage)
    const request = indexedDB.open("PremiumGalleryDB", 1);
    
    request.onupgradeneeded = function(e) {
      db = e.target.result;
      if (!db.objectStoreNames.contains("media")) {
        db.createObjectStore("media", { keyPath: "id", autoIncrement: true });
      }
    };

    request.onsuccess = function(e) {
      db = e.target.result;
      renderGallery();
    };

    function toggleUploadPanel() {
      const panel = document.getElementById("uploadPanel");
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    }

    function switchCategory(category, element) {
      currentCategory = category;
      document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');
      renderGallery();
    }

    // 2. Optimized Fetch and Render Logic
    function renderGallery(filterText = "") {
      if (!db) return;
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";
      const query = filterText.toLowerCase();

      const transaction = db.transaction(["media"], "readonly");
      const store = transaction.objectStore("media");
      const getAllRequest = store.getAll();

      getAllRequest.onsuccess = function() {
        const items = getAllRequest.result;
        
        items.forEach((item) => {
          if (currentCategory !== "all" && item.album !== currentCategory) return;
          if (query && !item.name.toLowerCase().includes(query)) return;

          const card = document.createElement("div");
          card.className = "photo-card";
          const isVideo = item.type && item.type.startsWith("video");

          let mediaTag = isVideo 
            ? `<video src="${item.url}" muted onclick="openLightboxFromDb(${item.id})"></video><span class="video-badge"><i class="fa-solid fa-video"></i></span>`
            : `<img src="${item.url}" alt="Media" onclick="openLightboxFromDb(${item.id})">`;

          let commentsHtml = (item.comments || []).map(c => `<div><b>User:</b> ${c}</div>`).join("");

          card.innerHTML = `
            <div class="media-container">${mediaTag}</div>
            <div class="card-info">
              <h3>${item.name}</h3>
              <span class="album-tag"><i class="fa-regular fa-folder"></i> ${item.album}</span>
            </div>
            <div class="social-row">
              <div class="social-actions">
                <button class="action-icon-btn ${item.liked ? 'liked' : ''}" onclick="toggleLike(${item.id})">
                  <i class="fa-${item.liked ? 'solid' : 'regular'} fa-heart"></i> <span>${item.likes || 0}</span>
                </button>
                <button class="action-icon-btn" onclick="document.getElementById('comment-in-${item.id}').focus()">
                  <i class="fa-regular fa-comment"></i> <span>${item.comments ? item.comments.length : 0}</span>
                </button>
              </div>
              <div class="social-actions">
                <button class="action-icon-btn" style="color:#74b9ff" onclick="downloadMedia('${item.url}', '${item.name}')"><i class="fa-solid fa-download"></i></button>
                <button class="action-icon-btn" style="color:#ff7675" onclick="deleteMedia(${item.id})"><i class="fa-regular fa-trash-can"></i></button>
              </div>
            </div>
            <div class="comments-summary">
              <div style="max-height: 50px; overflow-y:auto;">${commentsHtml}</div>
              <div class="comment-input-box">
                <input type="text" id="comment-in-${item.id}" placeholder="Add comment..." onkeydown="if(event.key === 'Enter') addComment(${item.id})">
              </div>
            </div>
          `;
          gallery.appendChild(card);
        });
      };
    }

    function filterGallery() {
      renderGallery(document.getElementById("searchBar").value);
    }

    // 3. Media Uploading & Saving inside IndexedDB
    document.getElementById("mediaUpload").addEventListener("change", function (event) {
      const files = event.target.files;
      const album = document.getElementById("albumSelect").value;

      Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = function (e) {
          const transaction = db.transaction(["media"], "readwrite");
          const store = transaction.objectStore("media");
          
          store.add({
            name: file.name,
            album: album,
            url: e.target.result,
            type: file.type,
            likes: 0,
            liked: false,
            comments: []
          });

          transaction.oncomplete = function() { renderGallery(); };
        };
        reader.readAsDataURL(file);
      });
      toggleUploadPanel();
    });

    // 4. Update Actions (Like, Comment, Delete)
    function updateItem(id, updateCallback) {
      const transaction = db.transaction(["media"], "readwrite");
      const store = transaction.objectStore("media");
      const request = store.get(id);

      request.onsuccess = function() {
        const item = request.result;
        updateCallback(item);
        store.put(item);
      };
      transaction.oncomplete = function() { renderGallery(); };
    }

    function toggleLike(id) {
      updateItem(id, function(item) {
        item.liked = !item.liked;
        item.likes = (item.likes || 0) + (item.liked ? 1 : -1);
      });
    }

    function addComment(id) {
      const input = document.getElementById(`comment-in-${id}`);
      if (input.value.trim() !== "") {
        const text = input.value.trim();
        updateItem(id, function(item) {
          if (!item.comments) item.comments = [];
          item.comments.push(text);
        });
        input.value = "";
      }
    }

    function deleteMedia(id) {
      if(confirm("Delete this file permanently?")) {
        const transaction = db.transaction(["media"], "readwrite");
        db.transaction(["media"], "readwrite").objectStore("media").delete(id);
        transaction.oncomplete = function() { renderGallery(); };
      }
    }

    function downloadMedia(url, filename) {
      const a = document.createElement("a");
      a.href = url;
      a.download = filename || "download";
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
    }

    function openLightboxFromDb(id) {
      const store = db.transaction(["media"], "readonly").objectStore("media");
      store.get(id).onsuccess = function(e) {
        const item = e.target.result;
        const viewerContainer = document.getElementById("lightboxMediaItem");
        const isVideo = item.type && item.type.startsWith("video");

        if (isVideo) {
          viewerContainer.innerHTML = `<video src="${item.url}" controls autoplay style="max-width:100%; max-height:85vh;"></video>`;
        } else {
          viewerContainer.innerHTML = `<img src="${item.url}" alt="View">`;
        }
        document.getElementById("lightbox").style.display = "flex";
      };
    }

    function closeLightbox() {
      document.getElementById("lightboxMediaItem").innerHTML = "";
      document.getElementById("lightbox").style.display = "none";
    }
  </script>
</body>
</html>
