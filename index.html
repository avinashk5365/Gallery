<!DOCTYPE html>
<html lang="hi">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Global Public Photo & Video Gallery</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    :root {
      --glass-bg: rgba(255, 255, 255, 0.08);
      --glass-blur: blur(12px);
      --glass-border: rgba(255, 255, 255, 0.15);
      --accent-color: #ff4757;
      --primary-blue: #4a90e2;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: linear-gradient(135deg, #0f0c20, #15102a, #060409);
      min-height: 100vh;
      color: #fff;
      padding-bottom: 90px;
    }

    header {
      background: rgba(15, 12, 32, 0.5);
      backdrop-filter: var(--glass-blur);
      border-bottom: 1px solid var(--glass-border);
      padding: 20px;
      text-align: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 {
      font-size: 24px;
      font-weight: 600;
      background: linear-gradient(45deg, #ff7675, #74b9ff);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .top-controls { max-width: 600px; margin: 20px auto; padding: 0 15px; }
    .search-box { display: flex; background: var(--glass-bg); border: 1px solid var(--glass-border); border-radius: 30px; padding: 5px 15px; align-items: center; }
    .search-box input { background: transparent; border: none; outline: none; color: white; width: 100%; padding: 10px 0; font-size: 15px; }
    .search-box i { color: #a0a0a0; margin-right: 10px; }

    .categories { display: flex; gap: 10px; overflow-x: auto; padding: 10px 15px; max-width: 800px; margin: 0 auto; }
    .cat-btn { background: var(--glass-bg); border: 1px solid var(--glass-border); color: #ccc; padding: 10px 20px; border-radius: 20px; cursor: pointer; white-space: nowrap; transition: 0.3s; }
    .cat-btn.active, .cat-btn:hover { background: var(--primary-blue); color: white; border-color: var(--primary-blue); }

    #gallery { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 25px; padding: 20px; max-width: 1200px; margin: 0 auto; }
    .photo-card { background: var(--glass-bg); backdrop-filter: var(--glass-blur); border: 1px solid var(--glass-border); border-radius: 20px; overflow: hidden; box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3); }

    .media-container { position: relative; width: 100%; height: 230px; overflow: hidden; background: #000; }
    .media-container img, .media-container video { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
    .video-badge { position: absolute; top: 12px; right: 12px; background: rgba(0,0,0,0.7); padding: 5px 8px; border-radius: 6px; font-size: 12px; }

    .card-info { padding: 15px; }
    .card-info h3 { font-size: 15px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .card-info .album-tag { font-size: 12px; color: #a0a0a0; }

    .social-row { display: flex; justify-content: space-between; align-items: center; padding: 10px 15px; border-top: 1px solid rgba(255, 255, 255, 0.05); }
    .social-actions { display: flex; gap: 15px; }
    .action-icon-btn { background: none; border: none; color: #b0b0b0; cursor: pointer; font-size: 16px; display: flex; align-items: center; gap: 5px; }
    .action-icon-btn.liked i { color: var(--accent-color); }

    .comments-summary { padding: 0 15px 15px 15px; font-size: 12px; }
    .comment-input-box { display: flex; gap: 5px; margin-top: 8px; }
    .comment-input-box input { flex: 1; background: rgba(0,0,0,0.2); border: 1px solid var(--glass-border); border-radius: 15px; padding: 6px 12px; color: white; font-size: 12px; }

    .fab-container { position: fixed; bottom: 25px; right: 25px; z-index: 200; display: flex; flex-direction: column; align-items: flex-end; gap: 15px; }
    .upload-options-panel { background: rgba(20, 15, 38, 0.95); border: 1px solid var(--glass-border); padding: 15px; border-radius: 20px; display: none; }
    .upload-options-panel select, .upload-options-panel input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid var(--glass-border); color: white; padding: 8px; margin-bottom: 10px; border-radius: 8px; }
    .fab { width: 60px; height: 60px; background: linear-gradient(135deg, #6c5ce7, #a29bfe); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 24px; color: white; cursor: pointer; box-shadow: 0 5px 20px rgba(108, 92, 231, 0.4); }

    #lightbox { display: none; position: fixed; z-index: 1000; left: 0; top: 0; width: 100%; height: 100%; background: rgba(5, 3, 10, 0.98); justify-content: center; align-items: center; }
    .lightbox-content-wrapper { position: relative; max-width: 90%; max-height: 80%; }
    #lightbox img, #lightbox video { max-width: 100%; max-height: 85vh; border-radius: 12px; }
    .close-lightbox { position: absolute; top: -50px; right: 10px; font-size: 30px; color: white; background: none; border: none; cursor: pointer; }
    
    #loadingStatus { display: none; color: #74b9ff; font-size: 13px; text-align: center; margin-top: 5px; }
  </style>
</head>

<body>

  <header>
    <h1>🌟 Public Media Hub</h1>
  </header>

  <div class="top-controls">
    <div class="search-box">
      <i class="fa-solid fa-magnifying-glass"></i>
      <input type="text" id="searchBar" placeholder="Search global gallery..." oninput="filterGallery()">
    </div>
  </div>

  <div class="categories">
    <button class="cat-btn active" onclick="switchCategory('all', this)">All</button>
    <button class="cat-btn" onclick="switchCategory('General', this)">General</button>
    <button class="cat-btn" onclick="switchCategory('Family', this)">Family (Friends)</button>
    <button class="cat-btn" onclick="switchCategory('Travel', this)">Travel</button>
    <button class="cat-btn" onclick="switchCategory('Work', this)">Work</button>
  </div>

  <div id="gallery"></div>

  <div class="fab-container">
    <div class="upload-options-panel" id="uploadPanel">
      <select id="albumSelect">
        <option value="General">General</option>
        <option value="Family">Family</option>
        <option value="Travel">Travel</option>
        <option value="Work">Work</option>
      </select>
      <input type="file" id="mediaUpload" accept="image/*,video/*" multiple>
      <div id="loadingStatus">Uploading to cloud... 🚀</div>
    </div>
    <div class="fab" onclick="toggleUploadPanel()"><i class="fa-solid fa-plus"></i></div>
  </div>

  <div id="lightbox">
    <div class="lightbox-content-wrapper">
      <button class="close-lightbox" onclick="closeLightbox()">&times;</button>
      <div id="lightboxMediaItem"></div>
    </div>
  </div>

  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-storage-compat.js"></script>

  <script>
    // 🔐 सुरक्षा निर्देश: क्लाइंट-साइड कोड (HTML) में कीज़ का दिखना सामान्य है, 
    // लेकिन आपको अपने Firebase Console में App Check और Security Rules को कड़ा करना होगा।
    const firebaseConfig = {
      apiKey: "YOUR_API_KEY",
      authDomain: "YOUR_AUTH_DOMAIN",
      projectId: "YOUR_PROJECT_ID",
      storageBucket: "YOUR_STORAGE_BUCKET",
      messagingSenderId: "YOUR_MESSAGING_SENDER_ID",
      appId: "YOUR_APP_ID"
    };

    // Initialize Firebase
    firebase.initializeApp(firebaseConfig);
    const db = firebase.firestore();
    const storage = firebase.storage();

    let currentCategory = "all";
    let globalItems = [];

    function toggleUploadPanel() {
      const panel = document.getElementById("uploadPanel");
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    }

    function switchCategory(category, element) {
      currentCategory = category;
      document.querySelectorAll('.cat-btn').forEach(btn => btn.classList.remove('active'));
      element.classList.add('active');
      renderUI();
    }

    // Realtime Sync
    db.collection("gallery").orderBy("timestamp", "desc").onSnapshot((snapshot) => {
      globalItems = [];
      snapshot.forEach((doc) => {
        globalItems.push({ id: doc.id, ...doc.data() });
      });
      renderUI();
    });

    function renderUI(filterText = "") {
      const gallery = document.getElementById("gallery");
      gallery.innerHTML = "";
      const query = filterText.toLowerCase();

      globalItems.forEach((item) => {
        if (currentCategory !== "all" && item.album !== currentCategory) return;
        if (query && !item.name.toLowerCase().includes(query)) return;

        const card = document.createElement("div");
        card.className = "photo-card";
        const isVideo = item.type && item.type.startsWith("video");

        let mediaTag = isVideo 
          ? `<video src="${item.url}" muted onclick="openLightbox('${item.url}', true)"></video><span class="video-badge"><i class="fa-solid fa-video"></i></span>`
          : `<img src="${item.url}" alt="Media" onclick="openLightbox('${item.url}', false)">`;

        let commentsHtml = (item.comments || []).map(c => `<div><b>User:</b> ${c}</div>`).join("");

        card.innerHTML = `
          <div class="media-container">${mediaTag}</div>
          <div class="card-info">
            <h3>${item.name}</h3>
            <span class="album-tag"><i class="fa-regular fa-folder"></i> ${item.album}</span>
          </div>
          <div class="social-row">
            <div class="social-actions">
              <button class="action-icon-btn" onclick="toggleLike('${item.id}', ${item.likes || 0})">
                <i class="fa-solid fa-heart" style="color:var(--accent-color)"></i> <span>${item.likes || 0}</span>
              </button>
            </div>
            <div class="social-actions">
              <button class="action-icon-btn" style="color:#74b9ff" onclick="downloadMedia('${item.url}', '${item.name}')"><i class="fa-solid fa-download"></i></button>
              <button class="action-icon-btn" style="color:#ff7675" onclick="deleteMedia('${item.id}', '${item.storagePath}')"><i class="fa-regular fa-trash-can"></i></button>
            </div>
          </div>
          <div class="comments-summary">
            <div style="max-height: 50px; overflow-y:auto;">${commentsHtml}</div>
            <div class="comment-input-box">
              <input type="text" id="comment-in-${item.id}" placeholder="Add comment..." onkeydown="if(event.key === 'Enter') addComment('${item.id}')">
            </div>
          </div>
        `;
        gallery.appendChild(card);
      });
    }

    function filterGallery() {
      renderUI(document.getElementById("searchBar").value);
    }

    // Cloud File Upload
    document.getElementById("mediaUpload").addEventListener("change", function (event) {
      const files = event.target.files;
      const album = document.getElementById("albumSelect").value;
      const status = document.getElementById("loadingStatus");

      if(files.length === 0) return;
      status.style.display = "block";

      Array.from(files).forEach(file => {
        const storagePath = `gallery/${Date.now()}_${file.name}`;
        const storageRef = storage.ref(storagePath);
        
        storageRef.put(file).then((snapshot) => {
          snapshot.ref.getDownloadURL().then((url) => {
            db.collection("gallery").add({
              name: file.name,
              album: album,
              url: url,
              type: file.type,
              storagePath: storagePath,
              likes: 0,
              comments: [],
              timestamp: firebase.firestore.FieldValue.serverTimestamp()
            });
            status.style.display = "none";
            toggleUploadPanel();
          });
        }).catch(err => {
          alert("Upload failed! Check Firebase Rules.");
          status.style.display = "none";
        });
      });
    });

    function toggleLike(id, currentLikes) {
      db.collection("gallery").doc(id).update({ likes: currentLikes + 1 });
    }

    function addComment(id) {
      const input = document.getElementById(`comment-in-${id}`);
      if (input.value.trim() !== "") {
        db.collection("gallery").doc(id).update({
          comments: firebase.firestore.FieldValue.arrayUnion(input.value.trim())
        });
        input.value = "";
      }
    }

    function deleteMedia(id, storagePath) {
      if(confirm("Delete this from Cloud permanently?")) {
        storage.ref(storagePath).delete().then(() => {
          db.collection("gallery").doc(id).delete();
        }).catch(() => {
          db.collection("gallery").doc(id).delete();
        });
      }
    }

    function downloadMedia(url, filename) {
      window.open(url, '_blank');
    }

    function openLightbox(url, isVideo) {
      const viewerContainer = document.getElementById("lightboxMediaItem");
      if (isVideo) {
        viewerContainer.innerHTML = `<video src="${url}" controls autoplay style="max-width:100%; max-height:85vh;"></video>`;
      } else {
        viewerContainer.innerHTML = `<img src="${url}" alt="View">`;
      }
      document.getElementById("lightbox").style.display = "flex";
    }

    function closeLightbox() {
      document.getElementById("lightboxMediaItem").innerHTML = "";
      document.getElementById("lightbox").style.display = "none";
    }
  </script>
</body>
</html>
